name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: cd SentimentAnalyzer/Tests && dotnet restore

      - name: Run backend tests
        run: cd SentimentAnalyzer/Tests && dotnet test --no-restore --logger "console;verbosity=detailed"

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SentimentAnalyzer/Frontend/sentiment-analyzer-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: SentimentAnalyzer/Frontend/sentiment-analyzer-ui/package-lock.json

      - run: npm ci

      - run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SentimentAnalyzer/Frontend/sentiment-analyzer-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: SentimentAnalyzer/Frontend/sentiment-analyzer-ui/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: SentimentAnalyzer/Frontend/sentiment-analyzer-ui/e2e/report/
          retention-days: 14
