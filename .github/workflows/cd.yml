name: CD

on:
  push:
    branches: [main]

# Cancel in-progress deployments on new push
permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===================== Gate: Run CI first =====================
  build-and-test:
    uses: ./.github/workflows/ci.yml

  # ===================== Deploy Frontend to Cloudflare Pages =====================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: SentimentAnalyzer/Frontend/sentiment-analyzer-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: SentimentAnalyzer/Frontend/sentiment-analyzer-ui/package-lock.json

      - run: npm ci

      - name: Build Angular for production
        run: npx ng build --configuration production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy SentimentAnalyzer/Frontend/sentiment-analyzer-ui/dist/sentiment-analyzer-ui/browser --project-name=insurance-ai-ops-hub

  # ===================== Deploy Backend to VPS =====================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: SentimentAnalyzer
          file: SentimentAnalyzer/Backend/Dockerfile
          push: true
          tags: |
            ghcr.io/anshulghogre4/insurance-ai-ops-hub:latest
            ghcr.io/anshulghogre4/insurance-ai-ops-hub:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/insurance-ai-ops-hub
            docker compose pull backend
            docker compose up -d
            docker image prune -f

      - name: Run smoke tests
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/insurance-ai-ops-hub
            bash scripts/smoke-test.sh
