services:
  # ===================== .NET Backend =====================
  backend:
    image: ghcr.io/anshulghogre4/insurance-ai-ops-hub:latest
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Database__Provider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=insurancehub;Username=app;Password=${POSTGRES_PASSWORD}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===================== PostgreSQL + pgvector =====================
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: insurancehub
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d insurancehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===================== Caddy (Reverse Proxy + Auto HTTPS) =====================
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
